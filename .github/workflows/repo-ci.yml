name: Repo CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - action_name: ghost-release
            action_path: actions/ghost-release
            lint: true
            test: false
          - action_name: label-actions
            action_path: actions/label-actions
            lint: false
            test: true
          - action_name: slack-build
            action_path: actions/slack-build
            lint: false
            test: false
    env:
      FORCE_COLOR: 1
    name: ${{ matrix.action_name }} / Node 22
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        env:
          FORCE_COLOR: 0
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: ${{ matrix.action_path }}/yarn.lock

      - run: yarn --prefer-offline --frozen-lockfile
        working-directory: ${{ matrix.action_path }}

      - run: yarn lint
        if: ${{ matrix.lint }}
        working-directory: ${{ matrix.action_path }}

      - run: yarn test
        if: ${{ matrix.test }}
        working-directory: ${{ matrix.action_path }}

      - run: yarn build
        working-directory: ${{ matrix.action_path }}

      - run: git diff --exit-code -- ${{ matrix.action_path }}/dist

      - name: Notify Slack on failure
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STATUS: ${{ job.status }}
        run: |
          node <<'EOF'
          const webhookUrl = process.env.SLACK_WEBHOOK_URL;

          if (!webhookUrl) {
              process.exit(0);
          }

          const statusInput = process.env.STATUS;
          const githubRepo = process.env.GITHUB_REPOSITORY;
          const githubSha = process.env.GITHUB_SHA || 'unknown';
          const githubActor = process.env.GITHUB_ACTOR;
          const githubRef = process.env.GITHUB_REF || 'unknown';
          const githubRunId = process.env.GITHUB_RUN_ID;

          const githubActorToSlackId = {
              ErisDS: 'U02563SGY',
              'sam-lord': 'U017YUER0HL',
              JoeeGrigg: 'U02LNNXJKGA',
              aileen: 'U04D59TH6',
              peterzimon: 'U7L3K6GM7',
              allouis: 'UCCEPHM39',
              vershwal: 'U05N8BNBAQ3',
              mike182uk: 'U052YFMMJQL',
              cmraible: 'U04ETKA5E3D',
              minimaluminium: 'U019YHN4WSG',
              '9larsons': 'U04HMKJDA79',
              kevinansfield: 'U051KGJR2',
              sagzy: 'U04RLV7E6F8',
              EvanHahn: 'U0A7KLGCHEW',
              troyciesco: 'U090DT54Y4B',
              'rob-ghost': 'U09E99K63JN',
              jonatansberg: 'U099U6NCFCN'
          };

          let statusColor = 'good';

          if (statusInput === 'cancelled') {
              statusColor = 'warning';
          } else if (statusInput === 'failure') {
              statusColor = 'danger';
          }

          const commitUrl = `https://github.com/${githubRepo}/commit/${githubSha}`;
          const linkifiedGithubRepo = `<https://github.com/${githubRepo}|${githubRepo}>`;
          const linkifiedCommitUrl = `<${commitUrl}|${githubSha.substring(0, 10)}>`;
          const branchParts = githubRef.split('/');
          const branch = branchParts[branchParts.length - 1];
          const openLink = `<https://github.com/${githubRepo}/actions/runs/${githubRunId}/|view>`;
          const actorLink = githubActorToSlackId[githubActor] ? `<@${githubActorToSlackId[githubActor]}>` : githubActor;

          const response = await fetch(webhookUrl, {
              method: 'POST',
              headers: {
                  'content-type': 'application/json'
              },
              body: JSON.stringify({
                  attachments: [{
                      color: statusColor,
                      text: `Test ${statusInput} at ${linkifiedCommitUrl} on \`${branch}\` of ${linkifiedGithubRepo} by ${actorLink} - ${openLink}`
                  }]
              })
          });

          if (!response.ok) {
              throw new Error(`Slack webhook failed with ${response.status}`);
          }
          EOF
